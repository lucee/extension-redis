name: Java CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to Maven Central'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.extract-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-

      - name: Extract version number
        id: extract-version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build extension
        run: mvn -B -e clean package -Dgoal=install

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: redis-lex
          path: |
            target/*.lex
            !target/*.lite.lex

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    env:
      LUCEE_TEST_VERSIONS_71: ${{ vars.LUCEE_TEST_VERSIONS_71 }}
      EXTENSION_VERSION: ${{ needs.build.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        lucee: ${{ fromJSON(vars.LUCEE_TEST_VERSIONS_71) }}
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      minio:
        image: fclairamb/minio-github-actions
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v6

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-

      - name: Cache Lucee files
        uses: actions/cache@v5
        with:
          path: ~/work/_actions/lucee/script-runner/main/lucee-download-cache
          key: lucee-downloads

      - name: Download extension artifact
        uses: actions/download-artifact@v8
        with:
          name: redis-lex
          path: target

      - name: Checkout Lucee
        uses: actions/checkout@v6
        with:
          repository: lucee/lucee
          path: lucee
          ref: ${{ matrix.lucee.branch }}

      - name: Patch Lucee's own redis-labeled ticket tests to use maven coordinates
        run: |
          python3 - <<'PYEOF'
          import sys, os

          version = os.environ["EXTENSION_VERSION"]
          patches = {
              "lucee/test/tickets/LDEV4408/Application.cfc": (
                  "\t\t, bundleName: 'redis.extension'",
                  f"\t\t, maven: 'org.lucee:redis:{version}'",
              ),
              "lucee/test/tickets/LDEV4342.cfc": (
                  "\t\t\t\t\tbundleName=\"redis.extension\"",
                  f"\t\t\t\t\tmaven=\"org.lucee:redis:{version}\"",
              ),
          }

          failed = False
          for path, (old, new) in patches.items():
              with open(path, encoding="utf-8") as f:
                  content = f.read()
              if old not in content:
                  print(f"::error::pattern not found in {path}: {old!r} (lucee/lucee test may have changed upstream)")
                  failed = True
                  continue
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content.replace(old, new, 1))
              print(f"patched {path}")

          if failed:
              sys.exit(1)
          PYEOF
        env:
          EXTENSION_VERSION: ${{ needs.build.outputs.version }}

      - name: Run Lucee Test Suite
        uses: lucee/script-runner@main
        with:
          webroot: ${{ github.workspace }}/lucee/test
          execute: /bootstrap-tests.cfm
          luceeVersion: ${{ matrix.lucee.version }}
          luceeVersionQuery: ${{ matrix.lucee.query }}
          extensionDir: ${{ github.workspace }}/target
        env:
          testLabels: redis
          testAdditional: ${{ github.workspace }}/tests
          REDIS_PORT: 6379
          REDIS_SERVER: localhost

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, test]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build and Deploy with Maven
        env:
          VERSION: ${{ needs.build.outputs.version }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "------- Maven Deploy snapshot -------";
            mvn -B -e clean deploy -Dgoal=deploy --settings maven-settings.xml
          elif [[ "$VERSION" == *-ALPHA ]]; then
            echo "------- Maven Install alpha -------";
            mvn -B -e clean install -Dgoal=install --settings maven-settings.xml
          else
            echo "------- Maven Deploy release -------";
            mvn -B -e clean deploy -Dgoal=deploy -DperformRelease=true --settings maven-settings.xml
          fi
